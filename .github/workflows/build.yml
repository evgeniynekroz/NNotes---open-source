name: Build APK
on:
  push:
    branches: [main]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create Flutter project skeleton
        run: flutter create --project-name nnotes --org com.nekroz .
      - name: Enable core library desugaring
        run: |
          sed -i 's/compileOptions {/compileOptions {\n        isCoreLibraryDesugaringEnabled = true/' android/app/build.gradle
          sed -i 's/dependencies {/dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")/' android/app/build.gradle
      - name: Install dependencies
        run: flutter pub get
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
      - name: Build APK
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
